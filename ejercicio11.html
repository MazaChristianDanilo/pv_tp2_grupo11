<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 11</title>
</head>
<body>
    <script>
        const kilometros = parseFloat(prompt("Ingrese el número de kilómetros recorridos: "));
        const litros = parseFloat(prompt("Ingrese el número de litros de combustible consumidos: "));
        const consumo = litros / kilometros;
        document.write(`Consumo: ${consumo.toFixed(3)} Litros/kilómetros`);
    </script>
</body>
</html>
